<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>HDMR Ultra Matematik</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: white; text-align: center; padding: 20px; }
        .container { max-width: 750px; margin: auto; background: #1a1f2e; padding: 30px; border-radius: 20px; border: 2px solid #3b82f6; box-shadow: 0 0 40px rgba(59, 130, 246, 0.3); }
        .header { color: #3b82f6; font-size: 2.2rem; font-weight: 900; margin-bottom: 20px; letter-spacing: 2px; }
        .stats { display: flex; justify-content: space-around; background: #252d3d; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; color: #4ecca3; }
        .level-selector { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        button { padding: 12px 18px; border: none; border-radius: 8px; background: #334155; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button.active { background: #3b82f6; transform: scale(1.1); }
        .q-card { background: #0f172a; padding: 50px 20px; border-radius: 15px; margin: 20px 0; font-size: 2rem; min-height: 150px; display: flex; align-items: center; justify-content: center; border: 1px inset #3b82f6; }
        input { width: 85%; padding: 20px; font-size: 2rem; background: #0f172a; border: 4px solid #3b82f6; border-radius: 15px; color: #facc15; text-align: center; outline: none; }
        #msg { margin-top: 15px; font-size: 1.2rem; height: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">HDMR KURULUŞ</div>

    <div class="stats">
        <span>Seviye: <span id="stat-lvl">5</span></span>
        <span>Zorluk Puanı: <span id="stat-diff">1</span></span>
        <span>Skor: <span id="stat-score">0</span></span>
    </div>

    <div class="level-selector">
        <button class="l-btn active" onclick="setBaseLevel(5, this)">5. Sınıf</button>
        <button class="l-btn" onclick="setBaseLevel(6, this)">6. Sınıf</button>
        <button class="l-btn" onclick="setBaseLevel(7, this)">7. Sınıf</button>
        <button class="l-btn" onclick="setBaseLevel(8, this)">8. Sınıf</button>
        <button class="l-btn" onclick="setBaseLevel(9, this)">9. Sınıf</button>
    </div>

    <div class="q-card" id="qContainer">Başlamak için bir sınıf seçin</div>
    
    <input type="text" id="answerBox" placeholder="Cevabı buraya yaz..." autocomplete="off" autofocus>
    
    <div id="msg"></div>
</div>

<script>
    let baseLevel = 5; 
    let difficultyMultiplier = 1; 
    let score = 0;
    let currentAns = "";

    function setBaseLevel(val, btn) {
        baseLevel = val;
        difficultyMultiplier = 1; // Her sınıf değişiminde zorluk sıfırlanır
        document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateStats();
        generateUltraQuestion();
    }

    function updateStats() {
        document.getElementById('stat-lvl').innerText = baseLevel;
        document.getElementById('stat-diff').innerText = difficultyMultiplier;
        document.getElementById('stat-score').innerText = score;
    }

    function generateUltraQuestion() {
        const box = document.getElementById('answerBox');
        box.value = "";
        box.focus();
        
        // Zorluk çarpanına göre sayıları büyüt ama sınıf sınırını aşma
        let maxNum = (baseLevel * 10) + (difficultyMultiplier * 5);
        let n1 = Math.floor(Math.random() * maxNum) + (difficultyMultiplier * 2);
        let n2 = Math.floor(Math.random() * (maxNum / 2)) + 2;

        const types = ["islem", "problem"];
        let choice = types[Math.floor(Math.random() * 2)];

        if (choice === "islem") {
            const ops = ['+', '-', '*'];
            let op = ops[Math.floor(Math.random() * (baseLevel > 6 ? 3 : 2))];
            
            if (op === '+') currentAns = (n1 + n2).toString();
            else if (op === '-') { if(n1 < n2) [n1, n2] = [n2, n1]; currentAns = (n1 - n2).toString(); }
            else { n1 = Math.floor(n1/5) + 1; currentAns = (n1 * n2).toString(); }
            
            document.getElementById('qContainer').innerText = `${n1} ${op} ${n2} = ?`;
        } else {
            // Sınıfa özel problem kalıpları
            const pLib = [
                {q: `${n1} sayısının ${n2} katının 5 fazlası kaçtır?`, a: (n1 * n2 + 5).toString()},
                {q: `Bir mumu yakarsak her saat ${n2} cm eriyor. ${difficultyMultiplier + 2} saatte kaç cm erir?`, a: (n2 * (difficultyMultiplier + 2)).toString()},
                {q: `Hangi sayının ${n2} eksiği ${n1} eder?`, a: (n1 + n2).toString()},
                {q: `${n1} cevizi ${n2} arkadaş paylaşırsak toplam kaç ceviz olur? (Yanlış soru kalıbı testi: cevap sadece sayı)`, a: (n1).toString()}
            ];
            let p = pLib[Math.floor(Math.random() * pLib.length)];
            document.getElementById('qContainer').innerText = p.q;
            currentAns = p.a;
        }
    }

    document.getElementById('answerBox').addEventListener('input', (e) => {
        if (e.target.value.trim() === currentAns) {
            score += 10;
            difficultyMultiplier++; // Her doğru cevapta zorluk 1 tık artar
            document.getElementById('msg').innerText = "✅ MÜKEMMEL! ZORLUK ARTTI.";
            document.getElementById('msg').style.color = "#4ecca3";
            updateStats();
            setTimeout(generateUltraQuestion, 800);
        }
    });

    // Başlangıç
    generateUltraQuestion();
</script>

</body>
</html>
